<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Acceso | Sistema de Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0A0E17;       /* Negro Profundo Tecnológico */
            --color-card: #141B2D;     /* Gris Oscuro Metalizado */
            --color-border: #242F4D;   /* Borde plomo oscuro */
            --color-text-main: #FFFFFF; /* Blanco Puro */
            --color-text-muted: #8A99AD;
            --color-primary: #00F2FE;   /* Verde Agua Eléctrico */
            --color-primary-hover: #00C9D4;
            --color-gradient: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--color-bg);
            background-image: radial-gradient(circle at 50% 50%, #152238 0%, #0A0E17 100%);
            color: var(--color-text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 27, 45, 0.85);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 40px 35px 45px 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 50px rgba(0, 242, 254, 0.03);
            position: relative;
            overflow: hidden;
        }

        /* Línea superior decorativa verde agua */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--color-gradient);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Contenedor optimizado para el logo */
        .brand-logo {
            max-width: 100%;
            height: auto;
            max-height: 110px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-header p {
            font-size: 14px;
            color: var(--color-text-muted);
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            background-color: rgba(10, 14, 23, 0.6);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text-main);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background-color: rgba(10, 14, 23, 0.9);
            border-color: var(--color-primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            color: #0A0E17;
            background: var(--color-gradient);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .alert-error {
            background-color: rgba(220, 38, 38, 0.2);
            color: #FCA5A5;
            border: 1px solid #DC2626;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.2);
            color: #A7F3D0;
            border: 1px solid #10B981;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: var(--color-text-muted);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <img src="logo.png" alt="ERA URBAN" class="brand-logo">
            <p>Ingresa tus credenciales para continuar</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="dniUser">DNI (Usuario)</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="dniUser" 
                        class="form-control" 
                        placeholder="Ingrese su DNI" 
                        maxlength="8" 
                        pattern="\d*"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="passwordUser">Contraseña</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="passwordUser" 
                        class="form-control" 
                        placeholder="••••••••" 
                        required
                    >
                </div>
            </div>

            <button type="submit" id="btnIngresar" class="btn-submit">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            &copy; 2026 ERA URBAN. Todos los derechos reservados.
        </div>
    </div>

    <script>
        // Configuración de credenciales de Supabase
        const SUPABASE_URL = "https://xprloimnqbjxlflntuvh.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwcmxvaW1ucWJqeGxmbG50dXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzU5MTAsImV4cCI6MjA5NDQ1MTkxMH0.1f0DIH1GdfeL70e7WRp3_xRUE7XYkLecWtRfNGOtw4o";
        
        // Inicialización del cliente global de Supabase
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elementos del DOM
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btnIngresar = document.getElementById('btnIngresar');

        // Manejador del Evento Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dni = document.getElementById('dniUser').value.trim();
            const password = document.getElementById('passwordUser').value.trim();

            // Feedback visual de carga
            btnIngresar.innerText = "Validando...";
            btnIngresar.disabled = true;
            ocultarAlerta();

            try {
                // Consulta directa a la tabla usuarios validando credenciales
                const { data, error } = await _supabase
                    .from('usuarios')
                    .select('*')
                    .eq('dni', dni)
                    .eq('password', password)
                    .maybeSingle();

                if (error) {
                    throw new Error("Error de conexión con la base de datos.");
                }

                if (!data) {
                    throw new Error("DNI o contraseña incorrectos.");
                }

                // Lógica de redirección limpia por rol verificado
                if (data.rol === 'admin') {
                    mostrarAlerta("Acceso correcto. Redirigiendo...", "success");
                    setTimeout(() => {
                        window.location.href = "admin.html"; 
                    }, 1200);
                } else {
                    mostrarAlerta(`Bienvenido, ${data.nombre_completo || 'Asesor'}.`, "success");
                    setTimeout(() => {
                        window.location.href = "usuario.html"; 
                    }, 1200);
                }

            } catch (err) {
                mostrarAlerta(err.message, "error");
                btnIngresar.innerText = "Iniciar Sesión";
                btnIngresar.disabled = false;
            }
        });

        // Funciones auxiliares de UI
        function mostrarAlerta(mensaje, tipo) {
            alertBox.innerText = mensaje;
            alertBox.className = `alert alert-${tipo}`;
            alertBox.style.display = 'block';
        }

        function ocultarAlerta() {
            alertBox.style.display = 'none';
        }
    </script>
</body>
</html>
